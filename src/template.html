        <header class="header">

            <h1 class="header__logo"><img src="./icons/logo.svg" alt=""></h1>

            <div class="temperature-toggle" role="group" aria-label="Temperature unit">

                    °C
                </button>

                <button class="temperature-toggle__button" aria-pressed="false" type="button">
                    °F
                </button>
            </div>

        </header>

            <div class="hero-content">
                <h2>How's the sky looking today?</h2>

                <form class="search-form" action="#">

                        Search city
                    </label>

                    <div class="input-group">
                        <input id="city-search" class="search-form__input" type="text"
                            placeholder="Search for a place..." />
                        <button type="submit">Search</button>
                    </div>
                </form>
            </div>
        </section>
